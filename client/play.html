<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <link rel="stylesheet" type="text/css" href="css/play.css">
<!--  <script type="module" src="js/index.js"></script>-->

</head>
<body>


  <!-- INPUTS -->
  <div id="answer-container" class="hide answer-container" >

    <h1>Where's Waldo?</h1>

    <div id="answer-input">
      <input id="answer-text" class="" type="text" placeholder="Enter Country" />
      <input id="answer-button" class="btn answer-button" type="button" value="Answer"  onclick="answer(this)" />
    </div>

  </div>


  <!-- HINT LAYOUT -->

  <div id="hints-container" class="hide hints-container" >

    <div id="hints-header">

      <h2 id="location-title-h2">Waldo's Last Known Location</h2>

      <div id="show-hints">

        <input class="btn" type="button" value="Get Hint" onclick="getHint()">
        <div id="remaining-hints-div"> Remaining Hints : <span id="remaining-hints-count"></span> </div>

      </div>

    </div>


    <div id="hints-div"> </div>

  </div>


</body>
</html>
