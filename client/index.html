<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <link rel="stylesheet" type="text/css" href="css/index.css">
  <link rel="stylesheet" type="text/css" href="css/toggle.css">
  <script type="module" src="./js/index.js"></script>

</head>
<body>


    <!--  NAV BAR  -->
    <nav id="navbar">

        <div id="menu-container">

            <input type="checkbox" id="toggle" class="toggle--checkbox">
            <label for="toggle" class="toggle--label">
                <span class="toggle--label-background"></span>
            </label>
            <div class="background"></div>

        </div>

        <div id="navbar-container">
            <ul id="nav-menu">
                <li class="nav-items"><a href="#" >Home</a></li>
                <li class="nav-items"><a href="#" >About</a></li>
                <li class="nav-items"><a href="#" >Contact</a></li>
            </ul>
        </div>

    </nav>


    <!--  INTRO  -->
    <div id="intro-div">
        <div id="intro-container" class="intro-container" >

            <div class="intro">
                <h1>Where on Earth is Waldo?</h1>
                <p>Welcome! Waldo is on the run and we must catch him before he escapes.
                    Use your geographical knowledge to find him before he flees!
                </p>
                <!--      <button id="start-button" class="btn" onclick="setTimeout('start()', 1500)">Help Find Waldo</button>-->
                <button id="start-button" class="btn">Help Find Waldo</button>
                <!-- ADDED setTimeout so all arrays have a chance to be given data into -->
            </div>

        </div>
    </div>


    <!-- HINTS -->
    <div id="hints-container" class="hide hints-container" >

        <div id="hints-header">

            <h2 id="location-title-h2">
                Waldo's Last Known Location
                <input id="next-button" class="btn next-button" type="button" value="Next"  />
            </h2>

            <div id="show-hints">

                <input id="get-hint-button" class="btn" type="button" value="Get Hint">
                <div id="remaining-hints-div"> Remaining Hints : <span id="remaining-hints-count"></span> </div>

            </div>

        </div>


        <div id="hints-div"> </div>

    </div>



    <div class="sun-background"></div>
    <div class="moon-background"></div>

</body>
</html>
